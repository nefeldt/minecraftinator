---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: minecraftproxies.minecraft.mittwald.de
spec:
  group: minecraft.mittwald.de
  names:
    kind: MinecraftProxy
    listKind: MinecraftProxyList
    plural: minecraftproxies
    singular: minecraftproxy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.activeRoutes
      name: Routes
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MinecraftProxy is the Schema for the minecraftproxies API.
          It deploys an itzg/mc-router instance that routes multiple Minecraft servers
          behind a single IP and port (25565) based on the hostname the client connects to.
          Routes are auto-discovered from MinecraftServer resources that set spec.domain.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MinecraftProxySpec defines the desired state of MinecraftProxy.
            properties:
              baseDomain:
                description: |-
                  BaseDomain is used to auto-assign subdomains to MinecraftServer instances
                  that have no explicit spec.domain set.
                  A random 6-character ID is generated and prepended: "<id>.<baseDomain>".
                  Example: "mc.feldt.systems" → "x7k2mq.mc.feldt.systems"
                type: string
              image:
                description: Image overrides the default itzg/mc-router image.
                type: string
              routes:
                description: |-
                  Routes allows manually adding hostname→server mappings that are not
                  managed by a MinecraftServer resource (e.g. external servers).
                  Auto-discovered routes from MinecraftServer.status.assignedDomain take
                  precedence over entries here with the same host.
                items:
                  description: RouteEntry maps a hostname to a backend MinecraftServer.
                  properties:
                    host:
                      description: Host is the hostname players connect to, e.g. "survival.mc.example.com".
                      minLength: 1
                      type: string
                    serverRef:
                      description: ServerRef is the name of the MinecraftServer in
                        the same namespace.
                      minLength: 1
                      type: string
                  required:
                  - host
                  - serverRef
                  type: object
                type: array
              serviceType:
                default: LoadBalancer
                description: ServiceType determines how mc-router itself is exposed.
                type: string
            type: object
          status:
            description: MinecraftProxyStatus defines the observed state of MinecraftProxy.
            properties:
              activeRoutes:
                description: ActiveRoutes lists all currently active hostname→backend
                  mappings.
                items:
                  description: ActiveRoute is a resolved route shown in status.
                  properties:
                    backend:
                      description: Backend is the resolved cluster-internal address.
                      type: string
                    host:
                      description: Host is the public hostname.
                      type: string
                    serverRef:
                      description: ServerRef is the MinecraftServer name backing this
                        route.
                      type: string
                    source:
                      description: Source indicates whether this route was auto-discovered
                        or manually specified.
                      enum:
                      - auto
                      - manual
                      type: string
                  required:
                  - backend
                  - host
                  - serverRef
                  - source
                  type: object
                type: array
              conditions:
                description: Conditions holds standard condition objects.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: Phase is the current lifecycle phase.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
