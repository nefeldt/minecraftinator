# Server with auto-generated subdomain — just set baseDomain, proxy is created automatically
apiVersion: minecraft.mittwald.de/v1alpha1
kind: MinecraftServer
metadata:
  name: survival
  namespace: default
spec:
  version: "1.21.4"
  type: PAPER
  motd: "Survival World"
  maxPlayers: 20
  difficulty: normal
  gamemode: survival
  memory: "2G"
  baseDomain: mc.feldt.systems   # → auto-assigned e.g. a3f9c1.mc.feldt.systems
  storage:
    size: "10Gi"
  resources:
    requests:
      cpu: "500m"
      memory: "2.5Gi"
    limits:
      cpu: "2"
      memory: "3Gi"
---
# Server with an explicit domain
apiVersion: minecraft.mittwald.de/v1alpha1
kind: MinecraftServer
metadata:
  name: creative
  namespace: default
spec:
  version: "1.21.4"
  type: PAPER
  motd: "Creative World"
  maxPlayers: 10
  difficulty: peaceful
  gamemode: creative
  memory: "2G"
  domain: creative.mc.feldt.systems
  storage:
    size: "5Gi"
---
# Standalone server — no proxy, exposed directly as NodePort
apiVersion: minecraft.mittwald.de/v1alpha1
kind: MinecraftServer
metadata:
  name: event
  namespace: default
spec:
  version: "1.21.4"
  type: VANILLA
  motd: "Event Server"
  memory: "1G"
  disableProxy: true
  serviceType: NodePort
  nodePort: 30065
